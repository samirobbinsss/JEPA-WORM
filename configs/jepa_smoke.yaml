# JEPA smoke config (Story 5.11) — runs a 2-step JEPA training pass on
# synthetic data to verify the contract path is wired end-to-end.
# Real headline config lives in pre-registration/configs/headline.yaml
# (Phase 0 finale, Story 7.9).
schema_version: 1

jepa:
  model_name: vit_tiny_patch16_224
  img_size: 64
  latent_dim: 32
  masking_ratio: 0.5
  n_steps: 2
  learning_rate: 0.0001
  ema_decay: 0.99
  seed: 42
  warm_start:
    eigenworm: true
    graph_prior: true
    neural: true
    behavioral: false  # no labels available in synthetic loader
