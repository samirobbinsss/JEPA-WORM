# 50-step JEPA dev config for the GUI ClipViewer demo.
# Long enough that the pose-decoder head's red predicted dots visibly
# converge onto the green ground-truth dots across the clips/ strip.
# Not used in any reportable pipeline — purely for dev-loop visualisation.
schema_version: 1

jepa:
  model_name: vit_tiny_patch16_224
  img_size: 64
  latent_dim: 32
  masking_ratio: 0.5
  n_steps: 50
  learning_rate: 0.001
  ema_decay: 0.99
  seed: 42
  warm_start:
    eigenworm: true
    graph_prior: true
    neural: true
    behavioral: false
