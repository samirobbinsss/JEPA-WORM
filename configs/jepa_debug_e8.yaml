# Headline-collapse research sandbox — NOT a frozen artifact.
#
# Experiment 8 (2026-05-21): curriculum + higher head learning rate.
#
# Experiment 7 proved the two-phase curriculum solves collapse — the
# encoder std held ~0.30 through the freeze + all of phase 2. But the
# eigenworm and neural warm-start heads did not converge: their losses
# bounced (eig 40k-250k, neu 2-5M) with no downtrend over 100 phase-2
# steps at the shared base lr 1e-4. The heads fit a frozen encoder in
# phase 2 — a supervised regression — and 1e-4 is too slow for the
# limited phase-2 budget.
#
# E8 changes one knob from E7: head_learning_rate 1e-4 -> 1e-3. The
# heads now train in their own optimizer param-group at 10x the encoder
# lr. The encoder + predictor stay at 1e-4. Watch the eigenworm /
# neural losses actually drop in phase 2 while the encoder std stays
# ~0.30.

schema_version: 1

jepa:
  model_name: vjepa2_1_vit_large_384
  img_size: 384
  latent_dim: 1024
  masking_ratio: 0.75
  n_steps: 500
  batch_size: 8
  learning_rate: 0.0001
  head_learning_rate: 0.001
  warmup_steps: 50
  ema_decay: 0.996
  seed: 42
  predictor_layers: 6
  predictor_heads: 8
  standardize_target: false
  warm_start:
    eigenworm: true
    graph_prior: true
    neural: true
    behavioral: true
  warm_start_loss_scale: 1.0
  warm_start_after_step: 300
  frozen_target: false
  vjepa_variant: vjepa2_1_vit_large_384
  pretrained_checkpoint_sha: null
  online_init: vjepa
  variance_reg_weight: 25.0
  covariance_reg_weight: 0.2

dataset:
  loaders:
    - name: baaiworm
      clip_frames: 16
      image_size: 384
      n_worms: 250
      clips_per_worm: 20
      n_keypoints: 49
      n_neurons: 8
