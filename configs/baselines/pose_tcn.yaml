# Pose-only TCN baseline — headline neural-decoding comparator (Story 3.6).
#
# The PRD's headline partial-R² claim must clear this baseline's latent
# (residualized in Epic 6 Story 6.1). Phase 0 v0 uses a small causal TCN
# trained with a supervised future-pose objective; Epic 6 may refine the
# objective to the full JEPA pattern if needed.
schema_version: 1

baseline:
  name: pose_tcn
  horizons_seconds: [0.1, 1.0, 5.0]
  frame_dt_seconds: 0.1
  seed: 0

dataset:
  loaders:
    - name: synthetic
      clip_frames: 16
      n_worms: 4
      clips_per_worm: 3
